<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#090e12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<title>MyDashboard</title>
<link rel="manifest" href="./manifest.json">

<style>
  :root {
    --bg: #090e12;
    --surface: #0f1820;
    --surface2: #131f28;
    --border: rgba(255,255,255,0.07);
    --text: #e8f4f2;
    --muted: #4a6870;
    --accent: #1cc4a8;
    --accent2: #7ee8d8;
    --warn: #ef9f27;
    --danger: #e24b4a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
    max-width: 480px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOPBAR BRAND ── */
  #brand-wrap {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--surface); height: 48px; padding: 0 20px;
    border-bottom: 1px solid var(--border);
    width: 100%;
  }
  #app-icon { width: 24px; height: 24px; object-fit: contain; border-radius: 4px; }
  #logo { font-size: 14px; font-weight: 700; letter-spacing: .05em; color: var(--accent2); }

  /* ── HEADER OROLOGIO ── */
  .clock-section {
    padding: 28px 24px 32px;
    text-align: center;
  }
  .clock-time {
    font-family: sans-serif;
    font-size: 78px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .clock-time .ore { font-weight: 700; }
  .clock-time .sep { font-weight: 300; color: var(--accent); margin: 0 3px; }
  .clock-time .min { font-weight: 300; }
  .clock-date {
    margin-top: 10px;
    font-size: 15px;
    color: var(--muted);
    text-transform: capitalize;
    font-weight: 400;
  }

  /* ── CARD BASE ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin: 0 16px 12px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label svg { opacity: 0.6; }
  .card-add-btn {
    margin-left: auto;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--accent);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    flex-shrink: 0;
  }
  .card-add-btn:active { background: var(--accent); color: #fff; }

  /* ── METEO ── */
  .weather-main { display: flex; align-items: center; gap: 16px; }
  .weather-icon { font-size: 48px; line-height: 1; }
  .weather-temp { font-size: 44px; font-weight: 300; font-family: sans-serif; letter-spacing: -1px; }
  .weather-temp sup { font-size: 20px; vertical-align: super; color: var(--muted); }
  .weather-city { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .weather-row { display: flex; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .weather-pill { flex: 1; text-align: center; font-size: 12px; color: var(--muted); }
  .weather-pill strong { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }

  /* ── AUTH ── */
  .auth-btn {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s;
  }
  .auth-btn:active { background: rgba(124,131,245,0.15); }
  .auth-btn.logout {
    border-color: var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 8px;
    margin-top: 10px;
  }

  /* ── EVENTI ── */
  .event-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .event-item:last-child { border-bottom: none; padding-bottom: 0; }
  .event-time-col { min-width: 44px; text-align: right; font-size: 12px; color: var(--muted); padding-top: 1px; line-height: 1.5; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
  .event-dot.today { background: var(--accent2); }
  .event-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .event-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .event-day-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); padding: 8px 0 4px; }
  .no-events { font-size: 14px; color: var(--muted); text-align: center; padding: 16px 0; }

  /* ── PROMEMORIA ── */
  .reminder-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .reminder-item:last-child { border-bottom: none; }
  .reminder-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .reminder-check.done { background: var(--accent2); border-color: var(--accent2); }
  .reminder-check.done::after {
    content: ''; width: 5px; height: 9px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px); display: block;
  }
  .reminder-body { flex: 1; min-width: 0; }
  .reminder-text { font-size: 14px; color: var(--text); transition: opacity 0.15s; }
  .reminder-text.done { opacity: 0.35; text-decoration: line-through; }
  .reminder-due { font-size: 11px; color: var(--accent2); margin-top: 1px; }
  .reminder-del {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: transparent; color: var(--muted); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .reminder-del:active { color: var(--danger); }
  .no-reminders { font-size: 14px; color: var(--muted); text-align: center; padding: 12px 0; }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MODALE ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 1000; backdrop-filter: blur(2px);
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-top-left-radius: 24px; border-top-right-radius: 24px;
    border: 1px solid var(--border); border-bottom: none;
    width: 100%; max-width: 480px;
    padding: 22px 20px calc(24px + env(safe-area-inset-bottom));
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 18px; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .field input, .field select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 11px 14px; color: var(--text); font-size: 15px;
    font-family: inherit; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }
  .toggle-row span { font-size: 14px; color: var(--text); }
  .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; transition: .2s; cursor: pointer; }
  .switch .slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 2px; top: 2px; background: var(--muted); border-radius: 50%; transition: .2s; }
  .switch input:checked + .slider { background: var(--accent); border-color: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(20px); background: #fff; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 13px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-save { background: var(--accent); color: #fff; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(90px);
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 50px;
    padding: 10px 20px; font-size: 13px;
    transition: transform 0.25s ease; z-index: 1100; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- BRAND / TOPBAR -->
<div id="brand-wrap">
  <img id="app-icon" src="icon-192.png" alt="Icona">
  <span id="logo">MyDashboard</span>
</div>

<!-- OROLOGIO -->
<div class="clock-section">
  <div class="clock-time" id="clock-time"><span class="ore">00</span><span class="sep">:</span><span class="min">00</span></div>
  <div class="clock-date" id="clock-date"></div>
</div>

<!-- METEO -->
<div class="card">
  <div class="card-label">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    Meteo
  </div>
  <div id="weather-content"><div class="spinner"></div></div>
</div>

<!-- CALENDARIO -->
<div class="card">
  <div class="card-label">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Calendario
    <button class="card-add-btn" onclick="openEventModal()" title="Nuovo evento">+</button>
  </div>
  <div id="calendar-content">
    <button class="auth-btn" onclick="signIn()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Accedi con Google
    </button>
  </div>
</div>

<!-- PROMEMORIA -->
<div class="card">
  <div class="card-label">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Promemoria
    <span id="reminders-sync" style="margin-left:auto;font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0"></span>
    <button class="card-add-btn" onclick="openGoogleTasks()" title="Aggiungi in Google Tasks" style="margin-left:8px">+</button>
  </div>
  <div id="reminders-content">
    <div class="no-reminders">Accedi con Google per i tuoi promemoria</div>
  </div>
</div>

<!-- MODALE NUOVO EVENTO -->
<div class="modal-overlay" id="event-modal">
  <div class="modal-sheet">
    <div class="modal-title">Nuovo Evento</div>
    <div class="field">
      <label>Titolo</label>
      <input type="text" id="ev-title" placeholder="Nome Evento" maxlength="200">
    </div>
    <div class="field">
      <label>Data</label>
      <input type="date" id="ev-date">
    </div>
    <div class="toggle-row">
      <span>Tutto il giorno</span>
      <label class="switch">
        <input type="checkbox" id="ev-allday" onchange="toggleAllDay()">
        <span class="slider"></span>
      </label>
    </div>
    <div class="field-row" id="ev-time-row">
      <div class="field">
        <label>Ora Inizio</label>
        <input type="time" id="ev-start" value="09:00">
      </div>
      <div class="field">
        <label>Ora Fine</label>
        <input type="time" id="ev-end" value="10:00">
      </div>
    </div>
    <div class="field">
      <label>Ripetizione</label>
      <select id="ev-recur">
        <option value="">Nessuna</option>
        <option value="RRULE:FREQ=DAILY">Giornaliera</option>
        <option value="RRULE:FREQ=WEEKLY">Settimanale</option>
        <option value="RRULE:FREQ=MONTHLY">Mensile</option>
        <option value="RRULE:FREQ=YEARLY">Annuale</option>
      </select>
    </div>
    <div class="field">
      <label>Notifica</label>
      <select id="ev-remind">
        <option value="0">Iniziale</option>
        <option value="10">10 Minuti Prima</option>
        <option value="30" selected>30 Minuti Prima</option>
        <option value="60">1 Ora Prima</option>
        <option value="1440">Il Giorno Prima</option>
        <option value="none">Nessuna</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEventModal()">Annulla</button>
      <button class="btn-save" id="ev-save-btn" onclick="createEvent()">Salva</button>
    </div>
  </div>
</div>

<!-- MODALE CONFERMA -->
<div class="modal-overlay" id="confirm-overlay" style="align-items:center">
  <div class="modal-sheet" style="border-radius:20px;max-width:340px;margin:0 16px;animation:none;border-bottom:1px solid var(--border)">
    <div class="modal-title" id="confirm-msg" style="font-weight:500;font-size:15px;line-height:1.45;margin-bottom:6px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="confirm-no">Annulla</button>
      <button class="btn-save" id="confirm-yes" style="background:var(--danger)">Elimina</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const GOOGLE_CLIENT_ID = '1070963206755-3eidjscj8u8sc4nlf0n0plu4tb6niq5a.apps.googleusercontent.com';
const OWM_KEY = '1805b29c395233b1bfa7efcc42e73ead';
const SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/tasks';
const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Europe/Rome';

// ═══════════════════════════════════════════
//  OROLOGIO
// ═══════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  document.querySelector('#clock-time .ore').textContent = hh;
  document.querySelector('#clock-time .min').textContent = mm;

  const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
	const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  document.getElementById('clock-date').textContent =
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

// ═══════════════════════════════════════════
//  METEO (GPS -> OpenWeatherMap)
// ═══════════════════════════════════════════
const weatherIcons = {
  '01d':'☀️','01n':'🌙','02d':'⛅','02n':'⛅','03d':'☁️','03n':'☁️',
  '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌦️',
  '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'
};

async function loadWeather(lat, lon) {
  try {
    const url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + lat + '&lon=' + lon + '&units=metric&lang=it&appid=' + OWM_KEY;
    const r = await fetch(url);
    const d = await r.json();
    const icon = weatherIcons[d.weather[0].icon] || '🌡️';
    const desc = d.weather[0].description;
    document.getElementById('weather-content').innerHTML =
      '<div class="weather-main">' +
        '<div class="weather-icon">' + icon + '</div>' +
        '<div><div class="weather-city">' + escapeHtml(d.name) + '</div>' +
        '<div style="font-size:13px;color:var(--muted);text-transform:capitalize">' + escapeHtml(desc) + '</div></div>' +
        '<div class="weather-temp" style="margin-left:auto">' + Math.round(d.main.temp) + '<sup>°C</sup></div>' +
      '</div>' +
      '<div class="weather-row">' +
        '<div class="weather-pill"><strong>' + Math.round(d.main.feels_like) + '°C</strong>Percepita</div>' +
        '<div class="weather-pill"><strong>' + d.main.humidity + '%</strong>Umidità</div>' +
        '<div class="weather-pill"><strong>' + Math.round(d.wind.speed * 3.6) + ' km/h</strong>Vento</div>' +
      '</div>';
  } catch(e) {
    document.getElementById('weather-content').innerHTML = '<div class="no-events">Errore Caricamento Meteo</div>';
  }
}

function initWeather() {
  if (!navigator.geolocation) {
    document.getElementById('weather-content').innerHTML = '<div class="no-events">GPS Non Disponibile</div>';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) { loadWeather(pos.coords.latitude, pos.coords.longitude); },
    function() { document.getElementById('weather-content').innerHTML = '<div class="no-events">Posizione Non Disponibile</div>'; }
  );
}
initWeather();

// ═══════════════════════════════════════════
//  GOOGLE OAuth2 (implicit flow)
// ═══════════════════════════════════════════
let accessToken = null;

function signIn() {
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: window.location.href.split('?')[0].split('#')[0],
    response_type: 'token',
    scope: SCOPES,
    prompt: 'select_account'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}

function signOut() {
  accessToken = null;
  localStorage.removeItem('gtoken');
  localStorage.removeItem('gtoken_exp');
  renderCalendarAuth();
  renderRemindersLoggedOut();
  toast('Disconnesso da Google');
}

function renderCalendarAuth() {
  document.getElementById('calendar-content').innerHTML =
    '<button class="auth-btn" onclick="signIn()">' +
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>' +
      'Accedi con Google</button>';
}

function checkTokenFromUrl() {
  const hash = window.location.hash;
  if (!hash) return false;
  const params = new URLSearchParams(hash.slice(1));
  const token = params.get('access_token');
  const expiresIn = parseInt(params.get('expires_in') || '3600');
  if (!token) return false;
  accessToken = token;
  localStorage.setItem('gtoken', token);
  localStorage.setItem('gtoken_exp', Date.now() + expiresIn * 1000);
  history.replaceState(null, '', window.location.pathname);
  return true;
}

function checkStoredToken() {
  const token = localStorage.getItem('gtoken');
  const exp = parseInt(localStorage.getItem('gtoken_exp') || '0');
  if (token && Date.now() < exp) { accessToken = token; return true; }
  return false;
}

function handleAuthExpired() {
  accessToken = null;
  localStorage.removeItem('gtoken');
  localStorage.removeItem('gtoken_exp');
  renderCalendarAuth();
  renderRemindersLoggedOut();
  toast('Sessione scaduta, riaccedi');
}

// ═══════════════════════════════════════════
//  CALENDARIO - Lettura Eventi
// ═══════════════════════════════════════════
async function loadCalendar() {
  document.getElementById('calendar-content').innerHTML =
    '<div style="text-align:center;padding:16px 0"><div class="spinner"></div></div>';
  try {
    const now = new Date();
    const end = new Date(now); end.setDate(end.getDate() + 7);
    const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?' +
      new URLSearchParams({
        timeMin: now.toISOString(),
        timeMax: end.toISOString(),
        singleEvents: 'true',
        orderBy: 'startTime',
        maxResults: '15'
      });
    const r = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
    if (r.status === 401) { handleAuthExpired(); return; }
    const data = await r.json();
    renderEvents(data.items || []);
  } catch(e) {
    document.getElementById('calendar-content').innerHTML = '<div class="no-events">Errore Caricamento Eventi</div>';
  }
}

function renderEvents(events) {
  if (!events.length) {
    document.getElementById('calendar-content').innerHTML =
      '<div class="no-events">Nessun evento nei prossimi 7 giorni</div>' +
      '<button class="auth-btn logout" onclick="signOut()">Disconnetti Account</button>';
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
	const months2 = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  let html = '';
  let lastDay = '';
  events.forEach(function(ev) {
    const start = ev.start.dateTime ? new Date(ev.start.dateTime) : new Date(ev.start.date + 'T00:00:00');
    const startDay = new Date(start); startDay.setHours(0,0,0,0);
    const dayKey = startDay.toDateString();
    if (dayKey !== lastDay) {
      lastDay = dayKey;
      let label;
      if (startDay.getTime() === today.getTime()) label = 'Oggi';
      else if (startDay.getTime() === tomorrow.getTime()) label = 'Domani';
      else label = days[startDay.getDay()] + ' ' + startDay.getDate() + ' ' + months2[startDay.getMonth()];
      html += '<div class="event-day-label">' + label + '</div>';
    }
    const isToday = startDay.getTime() === today.getTime();
    const timeStr = ev.start.dateTime
      ? start.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'})
      : 'Tutto Il Giorno';
    html += '<div class="event-item">' +
      '<div class="event-time-col">' + timeStr + '</div>' +
      '<div class="event-dot' + (isToday?' today':'') + '"></div>' +
      '<div><div class="event-title">' + escapeHtml(ev.summary || '(Senza Titolo)') + '</div>' +
      (ev.location ? '<div class="event-sub">📍 ' + escapeHtml(ev.location) + '</div>' : '') +
      '</div></div>';
  });
  html += '<button class="auth-btn logout" onclick="signOut()">Disconnetti Account</button>';
  document.getElementById('calendar-content').innerHTML = html;
}

// ═══════════════════════════════════════════════
//  CALENDARIO - Nuovo Evento (Scrittura via API)
// ═══════════════════════════════════════════════
function openEventModal() {
  if (!accessToken) { toast('Accedi con Google'); return; }
  // data di default: oggi
  const now = new Date();
  const p = function(n){ return String(n).padStart(2,'0'); };
  document.getElementById('ev-date').value = now.getFullYear() + '-' + p(now.getMonth()+1) + '-' + p(now.getDate());
  document.getElementById('ev-title').value = '';
  document.getElementById('ev-allday').checked = false;
  toggleAllDay();
  document.getElementById('event-modal').classList.add('show');
}

function closeEventModal() {
  document.getElementById('event-modal').classList.remove('show');
}

function toggleAllDay() {
  const allday = document.getElementById('ev-allday').checked;
  document.getElementById('ev-time-row').style.display = allday ? 'none' : 'flex';
}

function fmtLocal(dt) {
  const p = function(n){ return String(n).padStart(2,'0'); };
  return dt.getFullYear() + '-' + p(dt.getMonth()+1) + '-' + p(dt.getDate()) +
         'T' + p(dt.getHours()) + ':' + p(dt.getMinutes()) + ':00';
}

async function createEvent() {
  if (!accessToken) { toast('Accedi con Google prima'); return; }
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { toast('Inserisci un titolo'); return; }
  const dateVal = document.getElementById('ev-date').value;
  if (!dateVal) { toast('Inserisci una data'); return; }

  const allDay = document.getElementById('ev-allday').checked;
  const recur = document.getElementById('ev-recur').value;
  const remind = document.getElementById('ev-remind').value;

  const body = { summary: title };

  if (allDay) {
    const d = new Date(dateVal + 'T00:00:00');
    d.setDate(d.getDate() + 1);
    const p = function(n){ return String(n).padStart(2,'0'); };
    const endDate = d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate());
    body.start = { date: dateVal };
    body.end = { date: endDate };
  } else {
    const startTime = document.getElementById('ev-start').value || '09:00';
    const endTime = document.getElementById('ev-end').value;
    const startDT = new Date(dateVal + 'T' + startTime + ':00');
    let endDT = endTime ? new Date(dateVal + 'T' + endTime + ':00') : null;
    if (!endDT || endDT <= startDT) endDT = new Date(startDT.getTime() + 3600000);
    body.start = { dateTime: fmtLocal(startDT), timeZone: TZ };
    body.end = { dateTime: fmtLocal(endDT), timeZone: TZ };
  }

  if (recur) body.recurrence = [recur];

  if (remind === 'none') {
    body.reminders = { useDefault: false, overrides: [] };
  } else {
    body.reminders = { useDefault: false, overrides: [{ method: 'popup', minutes: parseInt(remind) }] };
  }

  const saveBtn = document.getElementById('ev-save-btn');
  saveBtn.textContent = 'Salvataggio…';
  saveBtn.disabled = true;

  try {
    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    saveBtn.textContent = 'Salva';
    saveBtn.disabled = false;
    if (res.status === 401) { handleAuthExpired(); return; }
    if (!res.ok) { toast('Errore creazione evento'); return; }
    closeEventModal();
    toast('Evento creato ✓');
    loadCalendar();
  } catch(e) {
    saveBtn.textContent = 'Salva';
    saveBtn.disabled = false;
    toast('Errore di rete');
  }
}

// ═══════════════════════════════════════════
//  PROMEMORIA (Google Tasks)
// ═══════════════════════════════════════════
let taskListId = null;
let tasks = [];

function renderRemindersLoggedOut() {
  document.getElementById('reminders-content').innerHTML =
    '<div class="no-reminders">Accedi con Google per i tuoi promemoria</div>';
  document.getElementById('reminders-sync').textContent = '';
}

function openGoogleTasks() {
  if (/Android/i.test(navigator.userAgent)) {
    window.location.href = 'intent://tasks.google.com/#Intent;scheme=https;package=com.google.android.apps.tasks;S.browser_fallback_url=https%3A%2F%2Ftasks.google.com%2F;end';
  } else {
    window.open('https://tasks.google.com/', '_blank');
  }
}

async function loadTasks() {
  const content = document.getElementById('reminders-content');
  content.innerHTML = '<div style="text-align:center;padding:12px 0"><div class="spinner"></div></div>';
  try {
    const listRes = await fetch('https://www.googleapis.com/tasks/v1/users/@me/lists', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (listRes.status === 401) { handleAuthExpired(); return; }
    const lists = await listRes.json();
    taskListId = (lists.items && lists.items.length) ? lists.items[0].id : null;
    if (!taskListId) { content.innerHTML = '<div class="no-reminders">Nessuna lista trovata</div>'; return; }

    const tRes = await fetch(
      'https://www.googleapis.com/tasks/v1/lists/' + taskListId + '/tasks?showCompleted=true&showHidden=true&maxResults=100',
      { headers: { Authorization: 'Bearer ' + accessToken } }
    );
    const tData = await tRes.json();
    tasks = (tData.items || []).sort(function(a, b) {
      // Completati sempre in fondo
      if ((a.status === 'completed') !== (b.status === 'completed'))
        return a.status === 'completed' ? 1 : -1;
      // Entrambi senza data: ordine invariato
      if (!a.due && !b.due) return 0;
      // Senza data vanno in fondo
      if (!a.due) return 1;
      if (!b.due) return -1;
      // Ordine cronologico crescente
      return new Date(a.due) - new Date(b.due);
    });
    renderTasks();
  } catch(e) {
    content.innerHTML = '<div class="no-reminders">Errore Caricamento Promemoria</div>';
  }
}

function fmtDue(due) {
  if (!due) return '';
  const d = new Date(due);
  const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  return d.getUTCDate() + ' ' + months[d.getUTCMonth()];
}

function renderTasks() {
  document.getElementById('reminders-sync').innerHTML =
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5dcaa5" stroke-width="2.5" style="vertical-align:-1px"><path d="M20 6L9 17l-5-5"/></svg> Sync';

  if (!tasks.length) {
    document.getElementById('reminders-content').innerHTML = '<div class="no-reminders">Nessun Promemoria</div>';
    return;
  }
  const list = tasks.map(function(t) {
    const done = t.status === 'completed';
    const due = fmtDue(t.due);
    return '<div class="reminder-item">' +
      '<div class="reminder-check' + (done?' done':'') + '" onclick="toggleTask(\'' + t.id + '\')"></div>' +
      '<div class="reminder-body">' +
        '<div class="reminder-text' + (done?' done':'') + '">' + escapeHtml(t.title || '(senza titolo)') + '</div>' +
        (due ? '<div class="reminder-due"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="vertical-align:-1px;margin-right:3px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + due + '</div>' : '') +
      '</div>' +
      '<button class="reminder-del" onclick="deleteTask(\'' + t.id + '\')">×</button>' +
      '</div>';
  }).join('');
  document.getElementById('reminders-content').innerHTML = list;
}

async function toggleTask(id) {
  const t = tasks.find(function(x){ return x.id === id; });
  if (!t) return;
  const newStatus = t.status === 'completed' ? 'needsAction' : 'completed';
  t.status = newStatus;
  renderTasks();
  try {
    const body = { status: newStatus };
    body.completed = newStatus === 'completed' ? new Date().toISOString() : null;
    const res = await fetch('https://www.googleapis.com/tasks/v1/lists/' + taskListId + '/tasks/' + id, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.status === 401) { handleAuthExpired(); return; }
    await loadTasks();
  } catch(e) { toast('Errore sincronizzazione'); }
}

function deleteTask(id) {
  confirmAction('Eliminare questo promemoria? Non sarà recuperabile.', function() { doDeleteTask(id); });
}

async function doDeleteTask(id) {
  tasks = tasks.filter(function(x){ return x.id !== id; });
  renderTasks();
  try {
    const res = await fetch('https://www.googleapis.com/tasks/v1/lists/' + taskListId + '/tasks/' + id, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (res.status === 401) { handleAuthExpired(); return; }
  } catch(e) { toast('Errore eliminazione'); }
}

// ═══════════════════════════════════════════
//  CONFERMA generica
// ═══════════════════════════════════════════
function confirmAction(message, onYes) {
  const overlay = document.getElementById('confirm-overlay');
  document.getElementById('confirm-msg').textContent = message;
  overlay.classList.add('show');
  const yesBtn = document.getElementById('confirm-yes');
  const noBtn = document.getElementById('confirm-no');
  function cleanup() {
    overlay.classList.remove('show');
    yesBtn.onclick = null; noBtn.onclick = null;
  }
  yesBtn.onclick = function() { cleanup(); onYes(); };
  noBtn.onclick = cleanup;
}

// ═══════════════════════════════════════════
//  UTIL
// ═══════════════════════════════════════════
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// chiudi i modali toccando lo sfondo
document.getElementById('event-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEventModal();
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderRemindersLoggedOut();

if (checkTokenFromUrl() || checkStoredToken()) {
  loadCalendar();
  loadTasks();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
